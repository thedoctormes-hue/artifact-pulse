# Artifact Pulse — конфигурация путей
# Укажи корневую папку лаборатории, остальное вычисляется автоматически

lab_dir: /root/LabDoctorM

# Папки с артефактами (относительно lab_dir)
# После миграции 21.06.2026 основные артефакты в projects/DoctorM_and_Ai/
artifact_dirs:
  pattern: projects/DoctorM_and_Ai/patterns
  adr: projects/DoctorM_and_Ai/adr
  rule: projects/DoctorM_and_Ai/rules
  spec: projects/DoctorM_and_Ai/docs/specs
  incident: projects/DoctorM_and_Ai/incidents
  metric: projects/DoctorM_and_Ai/metrics

# Файлы состояния (относительно lab_dir)
state_files:
  insights_queue: .qwen/artifacts/insights_queue.json
  search_index: .qwen/artifacts/search_index.json
  artifact_stats: .qwen/artifacts/artifact_stats.json
  health_history: .qwen/artifacts/health_history.jsonl
  alerts: .qwen/artifacts/alerts.json
  trends: .qwen/artifacts/trends.json
  changelog: ARTIFACT_CHANGELOG.md

# Шаблоны для автогенерации
templates_dir: projects/artifact-pulse/templates
